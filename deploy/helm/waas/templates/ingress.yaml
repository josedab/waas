{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "waas.fullname" . }}-ingress
  namespace: {{ include "waas.namespace" . }}
  labels:
    {{- include "waas.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: {{ include "waas.fullname" . }}-tls
  {{- end }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ include "waas.fullname" . }}-api
            port:
              number: {{ .Values.api.servicePort }}
      - path: /analytics
        pathType: Prefix
        backend:
          service:
            name: {{ include "waas.fullname" . }}-analytics
            port:
              number: {{ .Values.analytics.servicePort }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "waas.fullname" . }}-api
            port:
              number: {{ .Values.api.servicePort }}
{{- end }}
