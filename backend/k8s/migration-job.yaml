apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
  namespace: webhook-platform
  labels:
    app: db-migration
spec:
  template:
    metadata:
      labels:
        app: db-migration
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres -p 5432 -U $POSTGRES_USER; do
            echo "Waiting for postgres..."
            sleep 2
          done
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
      containers:
      - name: migrate
        image: migrate/migrate:latest
        command:
        - migrate
        - -path
        - /migrations
        - -database
        - $(DATABASE_URL)
        - up
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: webhook-platform-secrets
              key: DATABASE_URL
        volumeMounts:
        - name: migrations
          mountPath: /migrations
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          capabilities:
            drop:
            - ALL
      volumes:
      - name: migrations
        configMap:
          name: db-migrations
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-migrations
  namespace: webhook-platform
data:
  # Migration files would be populated from the migrations directory
  # This is a placeholder - in practice, you'd use a script to populate this
  .keep: ""