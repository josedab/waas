version: '3.8'

# Production Docker Compose Configuration
# This file is for reference and local production testing only
# Use Kubernetes manifests for actual production deployment

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: webhook_platform
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  api-service:
    build:
      context: .
      dockerfile: Dockerfile.api.prod
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    secrets:
      - database_url
      - jwt_secret
      - encryption_key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  delivery-engine:
    build:
      context: .
      dockerfile: Dockerfile.delivery.prod
    environment:
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - DELIVERY_WORKERS=10
    secrets:
      - database_url
      - webhook_signing_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile.analytics.prod
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL_FILE=/run/secrets/database_url
      - REDIS_URL=redis://redis:6379
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Backup service for automated backups
  backup:
    image: postgres:15-alpine
    environment:
      - DATABASE_URL_FILE=/run/secrets/database_url
    volumes:
      - backup_data:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
    command: |
      sh -c "
        while true; do
          sleep 86400  # 24 hours
          /backup.sh
        done
      "
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/webhook-platform/data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/webhook-platform/data/redis
  backup_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/webhook-platform/backups

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  database_url:
    file: ./secrets/database_url.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
  webhook_signing_secret:
    file: ./secrets/webhook_signing_secret.txt

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16