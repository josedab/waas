project_name: waas-cli
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: waas
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X webhook-platform/cmd/waas-cli/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: waas
      name: homebrew-tap
    homepage: "https://github.com/waas/waas"
    description: "WaaS CLI - Webhooks as a Service command line tool"
    install: |
      bin.install "waas"

nfpms:
  - package_name: waas-cli
    homepage: "https://github.com/waas/waas"
    maintainer: "WaaS Team"
    description: "WaaS CLI - Webhooks as a Service command line tool"
    formats:
      - deb
      - rpm
