run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - errorlint
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - unconvert
    - unparam
    - gofmt
  disable:
    - depguard

linters-settings:
  govet:
    shadow: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam
  gosec:
    excludes: []
  misspell:
    locale: US
  errorlint:
    errorf: true
    errorf-multi: true
    asserts: true
    comparison: true

issues:
  exclude-dirs:
    - vendor
    - docs
    - web
    - sdk
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: test/
      linters:
        - gosec
        - errcheck
    # Progressive errorlint rollout: internal/ is now fully enabled.
    # Remaining pkg/ sub-packages are excluded until they are updated.
    - path: pkg/delivery/
      linters:
        - errorlint
    - path: pkg/waf/
      linters:
        - errorlint
    - path: pkg/edge/
      linters:
        - errorlint
  max-issues-per-linter: 50
  max-same-issues: 5
