# Prometheus configuration for WaaS development
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'waas-api'
    static_configs:
      - targets: ['api:9100']
    metrics_path: /metrics

  - job_name: 'waas-delivery'
    static_configs:
      - targets: ['delivery-engine:9101']
    metrics_path: /metrics

  - job_name: 'waas-analytics'
    static_configs:
      - targets: ['analytics-collector:9102']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
