name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: '1.24'

defaults:
  run:
    working-directory: backend

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Check formatting
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "Unformatted files:"
          gofmt -s -l .
          exit 1
        fi

    - name: Run go vet
      run: go vet ./...

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m
        working-directory: backend

    - name: Validate .env.example completeness
      run: |
        if [ -f .env.example ]; then
          ENV_VARS_IN_CODE=$(grep -roh 'os\.Getenv("[^"]*")' --include='*.go' . 2>/dev/null \
            | grep -v '_test\.go' \
            | sed 's/os\.Getenv("//;s/")//' \
            | grep -v -E '^(RUN_|TEST_)' \
            | sort -u)
          MISSING=""
          for var in $ENV_VARS_IN_CODE; do
            if ! grep -q "^${var}=" .env.example 2>/dev/null && ! grep -q "^# *${var}=" .env.example 2>/dev/null; then
              MISSING="$MISSING $var"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::The following env vars are used in code but missing from .env.example:$MISSING"
            exit 1
          fi
          echo ".env.example is up to date."
        fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests with coverage
      run: go test -race -coverprofile=coverage.out -covermode=atomic ./pkg/... ./internal/... ./cmd/...

    - name: Check coverage threshold
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | sed 's/%//')
        echo "Total coverage: ${COVERAGE}%"
        THRESHOLD=70
        if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
          echo "::error::Coverage ${COVERAGE}% is below the required ${THRESHOLD}% threshold"
          exit 1
        fi

    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: backend/coverage.out

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: backend/coverage.out
        flags: unittests
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Build all binaries
      run: make build

    - name: Build all packages
      run: go build ./...

  license-check:
    name: License Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Install go-licenses
      run: go install github.com/google/go-licenses@latest

    - name: Check dependency licenses
      run: |
        go-licenses check ./... --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0 2>&1 | tee license-report.txt
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "::error::Found dependencies with disallowed or unknown licenses. See output above."
          exit 1
        fi

    - name: Upload license report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: license-report
        path: backend/license-report.txt

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, build]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: webhook_platform_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Download dependencies
      run: go mod download

    - name: Run integration tests
      env:
        TEST_DATABASE_URL: postgres://postgres:password@localhost:5432/webhook_platform_test?sslmode=disable
        TEST_REDIS_URL: redis://localhost:6379/12
      run: make -f Makefile.test test-integration
